<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Ruche · Financial Model</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    input[type="range"] { -webkit-appearance: none; appearance: none; height: 6px; background: #e5e0d8; border-radius: 3px; outline: none; cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #c8102e; cursor: pointer; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #c8102e; cursor: pointer; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    ::-webkit-scrollbar { display: none; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useMemo } = React;

const fmt = (n, d = 1) => {
  if (Math.abs(n) >= 1e6) return `$${(n / 1e6).toFixed(d)}M`;
  if (Math.abs(n) >= 1e3) return `$${(n / 1e3).toFixed(0)}K`;
  return `$${n.toFixed(0)}`;
};
const pct = (n) => `${(n * 100).toFixed(1)}%`;

function Slider({ label, value, onChange, min, max, step = 1, suffix = "", prefix = "", sub, fmt: fmtFn }) {
  const display = fmtFn ? fmtFn(value) : `${prefix}${value}${suffix}`;
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
        <span style={{ fontSize: 13, color: "#8a8578", fontFamily: "var(--sans)", letterSpacing: 0.3 }}>{label}</span>
        <span style={{ fontSize: 15, fontWeight: 700, color: "#1c1c1c", fontFamily: "var(--mono)" }}>{display}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(Number(e.target.value))}
        style={{ width: "100%", accentColor: "#c8102e" }} />
      {sub && <div style={{ fontSize: 11, color: "#a09a90", marginTop: 4, fontFamily: "var(--sans)" }}>{sub}</div>}
    </div>
  );
}

function StatCard({ label, value, sub, accent, small }) {
  return (
    <div style={{
      background: accent ? "linear-gradient(135deg, #1c1c1c 0%, #2a2520 100%)" : "#faf8f5",
      border: accent ? "none" : "1px solid #e5e0d8",
      borderRadius: 10, padding: small ? "14px 16px" : "20px 24px",
      flex: 1, minWidth: small ? 120 : 160,
    }}>
      <div style={{ fontSize: small ? 11 : 12, color: accent ? "#a09a90" : "#8a8578", fontFamily: "var(--sans)", letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: small ? 20 : 28, fontWeight: 700, color: accent ? "#f5f0e8" : "#1c1c1c", fontFamily: "var(--serif)", lineHeight: 1.1 }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: accent ? "#8a8578" : "#a09a90", marginTop: 4, fontFamily: "var(--sans)" }}>{sub}</div>}
    </div>
  );
}

function Section({ title, children, sub }) {
  return (
    <div style={{ marginBottom: 36 }}>
      {title && <h3 style={{ fontFamily: "var(--serif)", fontSize: 22, fontWeight: 400, color: "#1c1c1c", margin: "0 0 4px 0" }}>{title}</h3>}
      {sub && <p style={{ fontSize: 13, color: "#8a8578", margin: "0 0 16px 0", fontFamily: "var(--sans)", lineHeight: 1.5 }}>{sub}</p>}
      {children}
    </div>
  );
}

function RevenueBlock({ icon, name, color, amount, sub, children }) {
  return (
    <div style={{ border: "1px solid #e5e0d8", borderRadius: 10, padding: 20, marginBottom: 16, borderLeft: `4px solid ${color}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: children ? 16 : 0 }}>
        <div>
          <div style={{ fontSize: 11, fontFamily: "var(--sans)", letterSpacing: 1, textTransform: "uppercase", color: "#8a8578", marginBottom: 4 }}>{icon}</div>
          <div style={{ fontSize: 17, fontFamily: "var(--serif)", color: "#1c1c1c", fontWeight: 500 }}>{name}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 24, fontWeight: 700, fontFamily: "var(--mono)", color: "#1c1c1c" }}>{amount}</div>
          <div style={{ fontSize: 11, color: "#a09a90", fontFamily: "var(--sans)" }}>{sub}</div>
        </div>
      </div>
      {children}
    </div>
  );
}

function Bar({ label, value, max, color = "#1c1c1c" }) {
  const w = Math.min((value / max) * 100, 100);
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontFamily: "var(--sans)", color: "#8a8578", marginBottom: 4 }}>
        <span>{label}</span><span style={{ fontFamily: "var(--mono)", color: "#1c1c1c" }}>{fmt(value, 1)}</span>
      </div>
      <div style={{ background: "#eee8df", borderRadius: 4, height: 8, overflow: "hidden" }}>
        <div style={{ width: `${w}%`, background: color, height: "100%", borderRadius: 4, transition: "width 0.3s" }} />
      </div>
    </div>
  );
}

function CapStackBar({ senior, mezz, equity }) {
  const total = senior + mezz + equity;
  const sp = (senior / total) * 100;
  const mp = (mezz / total) * 100;
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ display: "flex", borderRadius: 8, overflow: "hidden", height: 40 }}>
        <div style={{ width: `${sp}%`, background: "#1c1c1c", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 11, fontFamily: "var(--sans)", transition: "width 0.3s" }}>
          {sp > 15 ? `Senior ${sp.toFixed(0)}%` : ""}
        </div>
        {mp > 0 && <div style={{ width: `${mp}%`, background: "#c8102e", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 11, fontFamily: "var(--sans)", transition: "width 0.3s" }}>
          {mp > 8 ? `Mezz ${mp.toFixed(0)}%` : ""}
        </div>}
        <div style={{ flex: 1, background: "#d4c9b8", display: "flex", alignItems: "center", justifyContent: "center", color: "#1c1c1c", fontSize: 11, fontFamily: "var(--sans)" }}>
          Equity {(100 - sp - mp).toFixed(0)}%
        </div>
      </div>
    </div>
  );
}

function DSCRGauge({ value }) {
  const color = value < 1.0 ? "#c8102e" : value < 1.25 ? "#d4820a" : "#2d6a30";
  const label = value < 1.0 ? "Danger" : value < 1.25 ? "Below minimum" : "Passes";
  return (
    <div style={{ textAlign: "center", padding: 20 }}>
      <div style={{ fontSize: 56, fontWeight: 700, fontFamily: "var(--mono)", color, lineHeight: 1 }}>{value.toFixed(2)}×</div>
      <div style={{ fontSize: 13, color, fontFamily: "var(--sans)", marginTop: 8, fontWeight: 600 }}>{label}</div>
      <div style={{ fontSize: 11, color: "#a09a90", fontFamily: "var(--sans)", marginTop: 4 }}>Banks require minimum 1.25×</div>
    </div>
  );
}

function InfoBox({ children, warn }) {
  return (
    <div style={{
      background: warn ? "#fef3f0" : "#f5f3ee",
      border: `1px solid ${warn ? "#e8c0b8" : "#e5e0d8"}`,
      borderRadius: 8, padding: 16, marginTop: 16, fontSize: 13, fontFamily: "var(--sans)", color: warn ? "#8b2010" : "#6b6560", lineHeight: 1.6,
    }}>{children}</div>
  );
}

function FCFChart({ y1, y2, y3 }) {
  const max = Math.max(Math.abs(y1), Math.abs(y2), Math.abs(y3), 1);
  const scale = 120 / max;
  const bar = (val, yr) => {
    const h = Math.abs(val) * scale;
    const neg = val < 0;
    return (
      <div key={yr} style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1 }}>
        <div style={{ height: 140, display: "flex", flexDirection: "column", justifyContent: "flex-end", alignItems: "center", position: "relative" }}>
          {neg && <div style={{ position: "absolute", bottom: 0, width: 48, height: h, background: "#c8102e", borderRadius: "4px 4px 0 0", opacity: 0.8, transform: "translateY(100%)" }} />}
          {!neg && <div style={{ width: 48, height: h, background: "#2d6a30", borderRadius: "4px 4px 0 0", opacity: 0.8 }} />}
        </div>
        <div style={{ borderTop: "2px solid #d4c9b8", width: 60, marginTop: 0 }} />
        <div style={{ fontSize: 14, fontFamily: "var(--mono)", fontWeight: 700, color: neg ? "#c8102e" : "#1c1c1c", marginTop: 8 }}>{fmt(val, 1)}</div>
        <div style={{ fontSize: 11, color: "#8a8578", fontFamily: "var(--sans)" }}>Year {yr}</div>
      </div>
    );
  };
  return <div style={{ display: "flex", gap: 12, justifyContent: "center", padding: "20px 0" }}>{[bar(y1, 1), bar(y2, 2), bar(y3, 3)]}</div>;
}

const TABS = [
  { id: 0, num: "1", label: "The Big Picture" },
  { id: 1, num: "2", label: "How Money Comes In" },
  { id: 2, num: "3", label: "Where It Goes" },
  { id: 3, num: "4", label: "What's Left Over" },
  { id: 4, num: "5", label: "What It's Worth" },
  { id: 5, num: "6", label: "Capital Stack" },
  { id: 6, num: "7", label: "Play With It" },
];

function LaRucheFinancialModel() {
  const [tab, setTab] = useState(0);
  const [clinOcc, setClinOcc] = useState(100);
  const [adr, setAdr] = useState(750);
  const [resOcc, setResOcc] = useState(100);
  const [rent] = useState(3438);
  const [seniorPct, setSeniorPct] = useState(63);
  const [mezzPct, setMezzPct] = useState(0);
  const [seniorRate, setSeniorRate] = useState(6.5);
  const [mezzRate, setMezzRate] = useState(12.0);
  const [capRate, setCapRate] = useState(6.0);

  const m = useMemo(() => {
    const totalCost = 78.5e6;
    const seniorAmt = totalCost * seniorPct / 100;
    const mezzAmt = totalCost * mezzPct / 100;
    const equityPct = Math.max(0, 100 - seniorPct - mezzPct);
    const equityAmt = totalCost * equityPct / 100;

    const clinRev = 68 * (clinOcc / 100) * adr * 365;
    const resRev = 80 * (resOcc / 100) * rent * 12;
    const wellRev = 4.0e6;
    const clubRev = 3.9e6;
    const totalRev = clinRev + resRev + wellRev + clubRev;
    const nonClinRev = resRev + wellRev + clubRev;

    const fixedCosts = 6.5e6;
    const clinVarCosts = clinRev * 0.55;
    const nonClinVarCosts = nonClinRev * 0.15;
    const totalOpex = fixedCosts + clinVarCosts + nonClinVarCosts;
    const ebitda = totalRev - totalOpex;
    const ebitdaMargin = totalRev > 0 ? ebitda / totalRev : 0;

    const propCoRents = resRev + 5.7e6;
    const propCoCosts = 2.0e6;
    const noi = propCoRents - propCoCosts;

    const r = seniorRate / 100 / 12;
    const n = 25 * 12;
    const seniorAnnual = r > 0 && seniorAmt > 0 ? seniorAmt * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1) * 12 : 0;
    const mezzAnnual = mezzAmt * mezzRate / 100;
    const totalDebt = seniorAnnual + mezzAnnual;

    const dscr = totalDebt > 0 ? ebitda / totalDebt : 99;
    const fcf3 = ebitda - totalDebt;

    // Year ramp
    const y1Rev = nonClinRev;
    const y1Opex = fixedCosts + nonClinRev * 0.15;
    const y1Ebitda = y1Rev - y1Opex;
    const fcf1 = y1Ebitda - totalDebt;

    const y2ClinRev = clinRev * 0.65;
    const y2Rev = y2ClinRev + nonClinRev;
    const y2Opex = fixedCosts + y2ClinRev * 0.55 + nonClinRev * 0.15;
    const y2Ebitda = y2Rev - y2Opex;
    const fcf2 = y2Ebitda - totalDebt;

    const propCoVal = capRate > 0 ? noi / (capRate / 100) : 0;
    const propCoValLow = noi / 0.06;
    const propCoValHigh = noi / 0.055;

    const opCoEbitda = clinRev * 0.45 + clubRev * 0.25;
    const opCoValLow = opCoEbitda * 7;
    const opCoValHigh = opCoEbitda * 9;

    const evLow = propCoValLow + opCoValLow;
    const evHigh = propCoValHigh + opCoValHigh;

    // Remaining senior debt after 7 years
    let balance = seniorAmt;
    const monthlyR = seniorRate / 100 / 12;
    const monthlyPmt = seniorAmt > 0 && monthlyR > 0 ? seniorAmt * (monthlyR * Math.pow(1 + monthlyR, n)) / (Math.pow(1 + monthlyR, n) - 1) : 0;
    for (let i = 0; i < 84; i++) {
      const interest = balance * monthlyR;
      const principal = monthlyPmt - interest;
      balance -= principal;
    }
    const remainingDebt = Math.max(0, balance) + mezzAmt;

    const netEquityLow = evLow - remainingDebt;
    const netEquityHigh = evHigh - remainingDebt;
    const eqMultLow = equityAmt > 0 ? netEquityLow / equityAmt : 0;
    const eqMultHigh = equityAmt > 0 ? netEquityHigh / equityAmt : 0;

    return {
      totalCost, seniorAmt, mezzAmt, equityPct, equityAmt,
      clinRev, resRev, wellRev, clubRev, totalRev, nonClinRev,
      totalOpex, ebitda, ebitdaMargin, noi, propCoRents,
      seniorAnnual, mezzAnnual, totalDebt, dscr,
      fcf1, fcf2, fcf3,
      propCoVal, propCoValLow, propCoValHigh,
      opCoEbitda, opCoValLow, opCoValHigh,
      evLow, evHigh,
      remainingDebt, netEquityLow, netEquityHigh, eqMultLow, eqMultHigh,
    };
  }, [clinOcc, adr, resOcc, rent, seniorPct, mezzPct, seniorRate, mezzRate, capRate]);

  const setMezzClamped = (v) => { if (v + seniorPct <= 95) setMezzPct(v); };
  const setSeniorClamped = (v) => { if (v + mezzPct <= 95) setSeniorPct(v); };

  const liveBadge = <span style={{ fontSize: 9, background: "#c8102e", color: "#fff", borderRadius: 3, padding: "2px 5px", fontFamily: "var(--sans)", letterSpacing: 0.5, verticalAlign: "middle", marginLeft: 6 }}>LIVE</span>;

  const renderTab = () => {
    switch (tab) {
      case 0: return (
        <div>
          <Section title="The Future of Living, Working, and Healing"
            sub="La Ruche is a premium, integrated living environment that brings together housing, behavioral health, wellness, and work into a single, purpose-built ecosystem in West Hollywood. By aligning the environment, community, and care into a single asset, La Ruche replaces fragmented, episodic models with a continuous, experience-driven approach that improves outcomes while generating multiple complementary revenue streams." />

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 12, marginBottom: 28 }}>
            <RevenueBlock icon="HEAL" name="Treatment Clinic" color="#c8102e" amount={fmt(m.clinRev)} sub="per year at full capacity">
              <div style={{ fontSize: 12, color: "#6b6560", fontFamily: "var(--sans)", lineHeight: 1.5 }}>Up to 200 community members use insurance or pay privately for therapy, detox, and mental health programs.</div>
            </RevenueBlock>
            <RevenueBlock icon="LIVE" name="Co-Living Apartments" color="#8b7355" amount={fmt(m.resRev)} sub="per year at full occupancy">
              <div style={{ fontSize: 12, color: "#6b6560", fontFamily: "var(--sans)", lineHeight: 1.5 }}>80 residents pay monthly rent for furnished, wellness-focused suites in West Hollywood.</div>
            </RevenueBlock>
            <RevenueBlock icon="WORK" name="Wellness Mall" color="#5a7a5a" amount={fmt(m.wellRev)} sub="per year at stabilization">
              <div style={{ fontSize: 12, color: "#6b6560", fontFamily: "var(--sans)", lineHeight: 1.5 }}>Therapists, doctors, and wellness providers rent clinical office space by the hour or month.</div>
            </RevenueBlock>
            <RevenueBlock icon="PLAY" name="Rooftop Social Club" color="#4a6a8a" amount={fmt(m.clubRev)} sub="per year at full membership">
              <div style={{ fontSize: 12, color: "#6b6560", fontFamily: "var(--sans)", lineHeight: 1.5 }}>Members pay $2K–$10K/year for a rooftop pool, restaurant, events, and sober nightlife.</div>
            </RevenueBlock>
          </div>

          <div style={{ background: "#1c1c1c", borderRadius: 12, padding: 28, textAlign: "center", marginBottom: 28 }}>
            <div style={{ fontSize: 12, color: "#a09a90", fontFamily: "var(--sans)", letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>Year 3 Stabilized — Total Annual Revenue {liveBadge}</div>
            <div style={{ fontSize: 48, fontWeight: 700, color: "#f5f0e8", fontFamily: "var(--serif)" }}>{fmt(m.totalRev)}</div>
          </div>

          <Section title="Why build all four at once?">
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 16 }}>
              {[
                { t: "Lower cost to acquire customers", d: "A treatment member becomes a co-living resident becomes a club member. You only paid to find them once." },
                { t: "Better outcomes = better business", d: "When members live and socialize in the same ecosystem, recovery rates improve, which drives referrals and reputation." },
                { t: "If one revenue stream slows, others don't", d: "An insurance cut doesn't affect apartment rents. A slow membership month doesn't affect clinical revenue." },
              ].map((item, i) => (
                <div key={i} style={{ background: "#f5f3ee", borderRadius: 8, padding: 16 }}>
                  <div style={{ fontSize: 14, fontFamily: "var(--serif)", fontWeight: 600, color: "#1c1c1c", marginBottom: 8 }}>{item.t}</div>
                  <div style={{ fontSize: 12, color: "#6b6560", fontFamily: "var(--sans)", lineHeight: 1.5 }}>{item.d}</div>
                </div>
              ))}
            </div>
          </Section>
        </div>
      );

      case 1: return (
        <div>
          <Section title="How Money Comes In" sub="Every number starts with a simple assumption: how many people, paying how much. Use the sliders — changes update every tab in the model instantly." />

          <RevenueBlock icon="HEAL" name="Treatment Clinic — the biggest revenue driver" color="#c8102e" amount={fmt(m.clinRev)} sub={`${((m.clinRev / m.totalRev) * 100).toFixed(0)}% of total`}>
            <div style={{ fontSize: 12, color: "#6b6560", fontFamily: "var(--sans)", lineHeight: 1.6, marginBottom: 16 }}>
              Think of it like a hotel, except instead of tourists paying $300/night, each "guest" is a member paying $500–$1,200 per day — and most of that comes from their health insurance, not their own pocket.
            </div>
            <Slider label="Clinical occupancy rate" value={clinOcc} onChange={setClinOcc} min={0} max={100} suffix="%" sub="200 max clients" />
            <Slider label="Average daily rate per member" value={adr} onChange={setAdr} min={400} max={1200} step={25} prefix="$" sub="$400–$1,200" />
            <InfoBox>The math: {(68 * clinOcc / 100).toFixed(0)} avg daily census × ${adr}/day × 365 days = {fmt(68 * (clinOcc / 100) * adr * 365)}</InfoBox>
          </RevenueBlock>

          <RevenueBlock icon="LIVE" name="Co-Living Apartments" color="#8b7355" amount={fmt(m.resRev)} sub="annual rental revenue">
            <div style={{ fontSize: 12, color: "#6b6560", fontFamily: "var(--sans)", lineHeight: 1.6, marginBottom: 16 }}>
              Like renting 80 furnished rooms in a premium building. West Hollywood's average rent for a high-end furnished room runs $3,000–$4,000/month.
            </div>
            <Slider label="Residential occupancy rate" value={resOcc} onChange={setResOcc} min={0} max={100} suffix="%" />
            <Slider label="Monthly rent per unit" value={rent} onChange={() => {}} min={2000} max={5000} step={50} prefix="$" sub="WeHo market rate" />
          </RevenueBlock>

          <RevenueBlock icon="WORK" name="Wellness Mall" color="#5a7a5a" amount={fmt(m.wellRev)} sub="at Year 3 stabilization (fixed)">
            <div style={{ fontSize: 12, color: "#6b6560", fontFamily: "var(--sans)", lineHeight: 1.6 }}>
              25,000 sq ft of clinical offices, therapy rooms, a cafe, gym, and longevity suites. Providers rent space by the hour, day, or month. The model assumes $160/sq ft/year.
            </div>
          </RevenueBlock>

          <RevenueBlock icon="PLAY" name="Rooftop Social Club" color="#4a6a8a" amount={fmt(m.clubRev)} sub="at full membership (fixed)">
            <div style={{ fontSize: 12, color: "#6b6560", fontFamily: "var(--sans)", lineHeight: 1.6 }}>
              12,000–15,000 sq ft rooftop with a pool, restaurant, and event space. Membership-based with tiered pricing ($2K–$10K/year). The model assumes ~500 active members at an average of $5,000/year, plus food & beverage adding another 35%.
            </div>
          </RevenueBlock>
        </div>
      );

      case 2: return (
        <div>
          <Section title="Where the Money Goes" sub="Every dollar coming in has to cover costs before anything is profit. Clinical costs scale with how many members are in treatment. Property costs scale with building occupancy. Debt service is set by the capital stack." />

          <div style={{ background: "#f5f3ee", borderRadius: 12, padding: 24, marginBottom: 24 }}>
            <div style={{ fontSize: 12, fontFamily: "var(--sans)", color: "#8a8578", marginBottom: 16, letterSpacing: 0.5, textTransform: "uppercase" }}>Expense Breakdown — Year 3 Stabilized {liveBadge}</div>
            <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
              <StatCard label="Total Revenue" value={fmt(m.totalRev)} small />
              <span style={{ fontSize: 24, color: "#a09a90", fontFamily: "var(--serif)" }}>−</span>
              <StatCard label="Operating Expenses" value={fmt(m.totalOpex)} small />
              <span style={{ fontSize: 24, color: "#a09a90", fontFamily: "var(--serif)" }}>=</span>
              <StatCard label="EBITDA" value={fmt(m.ebitda)} accent small />
            </div>
            <Bar label="Clinical variable costs" value={m.clinRev * 0.55} max={m.totalRev} color="#c8102e" />
            <Bar label="Fixed operating costs" value={6.5e6} max={m.totalRev} color="#1c1c1c" />
            <Bar label="Non-clinical variable costs" value={m.nonClinRev * 0.15} max={m.totalRev} color="#8b7355" />
          </div>

          <Section title='Why "variable" clinical costs matter'>
            <InfoBox>
              The therapists and clinicians at La Ruche are contracted per community member, not full-time salaried employees. At 50% capacity, clinical staffing costs drop ~50%. At 100% capacity, full costs, full revenue. No heavy fixed payroll in a slow month.
            </InfoBox>
          </Section>

          <Section title="Key financial engineering">
            <InfoBox>
              <strong>The cost that never changes:</strong> Debt service — the total annual payment on all loans — is fixed at {fmt(m.totalDebt)} regardless of revenue. This is the floor every other part of the business must clear before any profit reaches investors.
            </InfoBox>
            <InfoBox warn={m.dscr < 1.25}>
              <strong>Biggest risk:</strong> Revenue drops faster than variable costs can shrink, leaving insufficient cash to cover loan payments.
            </InfoBox>
          </Section>
        </div>
      );

      case 3: return (
        <div>
          <Section title="What's Actually Left Over" sub="Finance uses multiple overlapping terms for 'profit.' All numbers here update live from any slider in the model." />

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 16, marginBottom: 24 }}>
            <div style={{ border: "1px solid #e5e0d8", borderRadius: 10, padding: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                <div style={{ fontSize: 14, fontFamily: "var(--serif)", fontWeight: 600 }}>EBITDA</div>
                <div style={{ fontSize: 24, fontFamily: "var(--mono)", fontWeight: 700 }}>{fmt(m.ebitda)}</div>
              </div>
              <div style={{ fontSize: 11, color: "#8a8578", fontFamily: "var(--sans)", margin: "8px 0" }}>Earnings Before Interest, Taxes, Depreciation and Amortization</div>
              <div style={{ display: "flex", gap: 12 }}>
                <div style={{ background: "#f5f3ee", borderRadius: 6, padding: "8px 12px", flex: 1 }}>
                  <div style={{ fontSize: 18, fontFamily: "var(--mono)", fontWeight: 700 }}>{pct(m.ebitdaMargin)}</div>
                  <div style={{ fontSize: 10, color: "#8a8578" }}>margin</div>
                </div>
              </div>
            </div>

            <div style={{ border: "1px solid #e5e0d8", borderRadius: 10, padding: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                <div style={{ fontSize: 14, fontFamily: "var(--serif)", fontWeight: 600 }}>NOI — Net Operating Income</div>
                <div style={{ fontSize: 24, fontFamily: "var(--mono)", fontWeight: 700 }}>{fmt(m.noi)}</div>
              </div>
              <div style={{ fontSize: 11, color: "#8a8578", fontFamily: "var(--sans)", margin: "8px 0" }}>The real estate version of profit (PropCo only)</div>
              <div style={{ background: "#f5f3ee", borderRadius: 6, padding: "8px 12px" }}>
                <div style={{ fontSize: 18, fontFamily: "var(--mono)", fontWeight: 700 }}>{m.propCoRents > 0 ? pct(m.noi / m.propCoRents) : "—"}</div>
                <div style={{ fontSize: 10, color: "#8a8578" }}>margin on {fmt(m.propCoRents)} in rents</div>
              </div>
            </div>
          </div>

          <Section title="Free Cash Flow" sub="What's left after paying all loan obligations — money available to pay investors, reinvest, or distribute as dividends.">
            <FCFChart y1={m.fcf1} y2={m.fcf2} y3={m.fcf3} />
            <div style={{ textAlign: "center", fontSize: 11, color: "#8a8578", fontFamily: "var(--sans)", marginBottom: 8 }}>Free cash flow ramp — adjusts with capital stack changes {liveBadge}</div>
          </Section>

          <Section title="DSCR — Debt Service Coverage Ratio" sub="The bank's most important question: 'Can you afford the loan payments?'">
            <DSCRGauge value={m.dscr} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginTop: 16 }}>
              <div style={{ textAlign: "center", padding: 10, background: "#fef3f0", borderRadius: 6 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#c8102e" }}>Below 1.0×</div>
                <div style={{ fontSize: 10, color: "#8a8578" }}>Can't cover loans</div>
              </div>
              <div style={{ textAlign: "center", padding: 10, background: "#fef8e8", borderRadius: 6 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#d4820a" }}>1.25× min</div>
                <div style={{ fontSize: 10, color: "#8a8578" }}>Bank requirement</div>
              </div>
              <div style={{ textAlign: "center", padding: 10, background: "#f0f5f0", borderRadius: 6 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#2d6a30" }}>{m.dscr.toFixed(2)}× here</div>
                <div style={{ fontSize: 10, color: "#8a8578" }}>Current</div>
              </div>
            </div>
          </Section>
        </div>
      );

      case 4: return (
        <div>
          <Section title="What the Whole Thing Is Worth" sub="Two completely separate ways to value La Ruche — one for the real estate, one for the operating businesses. All valuation numbers update live from any slider." />

          <div style={{ border: "1px solid #e5e0d8", borderRadius: 10, padding: 20, marginBottom: 16 }}>
            <div style={{ fontSize: 16, fontFamily: "var(--serif)", fontWeight: 600, marginBottom: 12 }}>Layer 1 — The Real Estate (PropCo)</div>
            <div style={{ fontSize: 12, color: "#6b6560", fontFamily: "var(--sans)", lineHeight: 1.6, marginBottom: 16 }}>
              Value = NOI ÷ cap rate. In West Hollywood, investors typically accept 5.5–6.0% annual returns on premium mixed-use assets.
            </div>
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              <StatCard label="6.0% cap rate" value={fmt(m.propCoValLow)} small />
              <StatCard label="5.5% cap rate" value={fmt(m.propCoValHigh)} small />
            </div>
          </div>

          <div style={{ border: "1px solid #e5e0d8", borderRadius: 10, padding: 20, marginBottom: 16 }}>
            <div style={{ fontSize: 16, fontFamily: "var(--serif)", fontWeight: 600, marginBottom: 12 }}>Layer 2 — The Operating Businesses (OpCo)</div>
            <div style={{ fontSize: 12, color: "#6b6560", fontFamily: "var(--sans)", lineHeight: 1.6, marginBottom: 16 }}>
              Value = EBITDA × multiple. Healthcare and hospitality assets typically trade at 7–9×. OpCo EBITDA: {fmt(m.opCoEbitda)}.
            </div>
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              <StatCard label="7× multiple" value={fmt(m.opCoValLow)} small />
              <StatCard label="9× multiple" value={fmt(m.opCoValHigh)} small />
            </div>
          </div>

          <div style={{ background: "#1c1c1c", borderRadius: 12, padding: 28, textAlign: "center", marginBottom: 24 }}>
            <div style={{ fontSize: 12, color: "#a09a90", fontFamily: "var(--sans)", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 }}>Combined Enterprise Value (PropCo + OpCo) {liveBadge}</div>
            <div style={{ fontSize: 11, color: "#8a8578", marginBottom: 12, fontFamily: "var(--sans)" }}>on a total investment of $78.5M</div>
            <div style={{ fontSize: 40, fontWeight: 700, color: "#f5f0e8", fontFamily: "var(--serif)" }}>{fmt(m.evLow)} – {fmt(m.evHigh)}</div>
          </div>

          <div style={{ border: "1px solid #e5e0d8", borderRadius: 10, padding: 20 }}>
            <div style={{ fontSize: 16, fontFamily: "var(--serif)", fontWeight: 600, marginBottom: 16 }}>How Investors Get Their Money Back {liveBadge}</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12 }}>
              <StatCard label="Common equity invested" value={fmt(m.equityAmt)} sub={`${m.equityPct.toFixed(0)}% of total project cost`} small />
              <StatCard label="Net equity at exit (Year 7)" value={`${fmt(m.netEquityLow)} – ${fmt(m.netEquityHigh)}`} sub="After paying off remaining debt" small />
              <StatCard label="Equity multiple (7-year hold)" value={`${m.eqMultLow.toFixed(1)}× – ${m.eqMultHigh.toFixed(1)}×`} sub="Common equity return" accent small />
            </div>
          </div>
        </div>
      );

      case 5: return (
        <div>
          <Section title="Capital Stack" sub="The capital stack is how the $78.5M total project cost is financed. Drag the sliders to change the mix — and watch how it changes debt service, DSCR, and investor returns across every tab." />

          <div style={{ fontSize: 12, fontFamily: "var(--sans)", color: "#8a8578", letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 12 }}>Capital Structure — $78.5M Total Project Cost {liveBadge}</div>
          <CapStackBar senior={m.seniorAmt} mezz={m.mezzAmt} equity={m.equityAmt} />

          <Slider label="Senior debt (% of project cost)" value={seniorPct} onChange={setSeniorClamped} min={0} max={80} suffix="%" sub={fmt(m.seniorAmt)} />
          <Slider label="Mezzanine / preferred equity (%)" value={mezzPct} onChange={setMezzClamped} min={0} max={30} suffix="%" sub={fmt(m.mezzAmt)} />

          <div style={{ background: "#f5f3ee", borderRadius: 8, padding: 14, marginBottom: 20 }}>
            <div style={{ fontSize: 12, fontFamily: "var(--sans)", color: "#8a8578" }}>Common equity (auto-calculated)</div>
            <div style={{ fontSize: 18, fontFamily: "var(--mono)", fontWeight: 700 }}>{m.equityPct.toFixed(0)}% — {fmt(m.equityAmt)} to raise</div>
          </div>

          <div style={{ fontSize: 14, fontFamily: "var(--serif)", fontWeight: 600, marginBottom: 12 }}>Interest Rates</div>
          <Slider label="Senior debt interest rate" value={seniorRate} onChange={setSeniorRate} min={4} max={10} step={0.25} suffix="%" sub="25-yr amortization" />
          <Slider label="Mezzanine interest rate" value={mezzRate} onChange={setMezzRate} min={8} max={18} step={0.5} suffix="%" sub="interest-only" />

          <div style={{ border: "1px solid #e5e0d8", borderRadius: 10, padding: 16, marginBottom: 20 }}>
            <div style={{ fontSize: 12, fontFamily: "var(--sans)", color: "#8a8578", letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 12 }}>Annual Debt Service Breakdown {liveBadge}</div>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, fontFamily: "var(--sans)" }}>
              <thead>
                <tr style={{ borderBottom: "2px solid #e5e0d8" }}>
                  {["Layer", "Amount", "Rate", "Annual Payment", "Type"].map(h => (
                    <th key={h} style={{ textAlign: "left", padding: "8px 6px", color: "#8a8578", fontWeight: 500, fontSize: 11 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                <tr style={{ borderBottom: "1px solid #f0ece5" }}>
                  <td style={{ padding: "8px 6px" }}>Senior</td>
                  <td style={{ fontFamily: "var(--mono)" }}>{fmt(m.seniorAmt)}</td>
                  <td>{seniorRate}%</td>
                  <td style={{ fontFamily: "var(--mono)", fontWeight: 700 }}>{fmt(m.seniorAnnual)}</td>
                  <td>Amortizing</td>
                </tr>
                <tr style={{ borderBottom: "1px solid #f0ece5" }}>
                  <td style={{ padding: "8px 6px" }}>Mezzanine</td>
                  <td style={{ fontFamily: "var(--mono)" }}>{fmt(m.mezzAmt)}</td>
                  <td>{mezzRate}%</td>
                  <td style={{ fontFamily: "var(--mono)", fontWeight: 700 }}>{fmt(m.mezzAnnual)}</td>
                  <td>Interest-only</td>
                </tr>
                <tr style={{ fontWeight: 700 }}>
                  <td style={{ padding: "8px 6px" }}>Total</td>
                  <td style={{ fontFamily: "var(--mono)" }}>{fmt(m.seniorAmt + m.mezzAmt)}</td>
                  <td>—</td>
                  <td style={{ fontFamily: "var(--mono)" }}>{fmt(m.totalDebt)}</td>
                  <td>—</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12, marginBottom: 20 }}>
            <StatCard label="Total Debt Service" value={fmt(m.totalDebt)} sub="per year (fixed)" small />
            <StatCard label="DSCR (Year 3)" value={`${m.dscr.toFixed(2)}×`} small />
            <StatCard label="Free Cash Flow" value={fmt(m.fcf3)} small />
            <StatCard label="Equity to Raise" value={fmt(m.equityAmt)} accent small />
          </div>

          {m.dscr < 1.25 && <InfoBox warn>DSCR has fallen below 1.25×. This capital structure would not qualify for a standard commercial loan.</InfoBox>}
          {m.dscr >= 1.25 && <InfoBox>DSCR is <strong>{m.dscr.toFixed(2)}×</strong> — this capital structure passes standard lender requirements.</InfoBox>}
        </div>
      );

      case 6: return (
        <div>
          <Section title="Play With the Assumptions" sub="Move any slider — every number on every tab updates instantly. This is the master control panel for the entire model." />

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 20, marginBottom: 24 }}>
            <div style={{ border: "1px solid #e5e0d8", borderRadius: 10, padding: 20 }}>
              <div style={{ fontSize: 14, fontFamily: "var(--serif)", fontWeight: 600, marginBottom: 16 }}>Revenue Assumptions</div>
              <Slider label="Clinical occupancy rate" value={clinOcc} onChange={setClinOcc} min={0} max={100} suffix="%" />
              <Slider label="Average daily member rate" value={adr} onChange={setAdr} min={400} max={1200} step={25} prefix="$" />
              <Slider label="Residential occupancy" value={resOcc} onChange={setResOcc} min={0} max={100} suffix="%" />
            </div>
            <div style={{ border: "1px solid #e5e0d8", borderRadius: 10, padding: 20 }}>
              <div style={{ fontSize: 14, fontFamily: "var(--serif)", fontWeight: 600, marginBottom: 16 }}>Capital & Valuation</div>
              <Slider label="Senior LTC %" value={seniorPct} onChange={setSeniorClamped} min={0} max={80} suffix="%" />
              <Slider label="Mezzanine %" value={mezzPct} onChange={setMezzClamped} min={0} max={30} suffix="%" />
              <Slider label="PropCo cap rate (exit)" value={capRate} onChange={setCapRate} min={4} max={8} step={0.25} suffix="%" />
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10, marginBottom: 24 }}>
            <StatCard label="Total Revenue" value={fmt(m.totalRev)} small />
            <StatCard label="EBITDA" value={fmt(m.ebitda)} small />
            <StatCard label="EBITDA Margin" value={pct(m.ebitdaMargin)} small />
            <StatCard label="Free Cash Flow" value={fmt(m.fcf3)} small />
            <StatCard label="DSCR" value={`${m.dscr.toFixed(2)}×`} small />
            <StatCard label="Debt Service" value={fmt(m.totalDebt)} small />
            <StatCard label="PropCo Value" value={fmt(m.propCoVal)} sub={`Based on ${fmt(m.noi)} NOI`} small />
            <StatCard label="Equity to Raise" value={fmt(m.equityAmt)} sub={`${m.equityPct.toFixed(0)}% of $78.5M`} accent small />
          </div>

          {m.dscr < 1.25 || m.fcf3 < 0 ?
            <InfoBox warn>At these settings, {m.fcf3 < 0 ? "free cash flow goes negative" : "DSCR falls below 1.25×"}. The loan cannot be covered.</InfoBox> :
            <InfoBox>DSCR is <strong>{m.dscr.toFixed(2)}×</strong> — loan payments are comfortably covered.</InfoBox>
          }

          <Section title="The Four Assumptions That Matter Most" sub="Drag any of these down and watch what breaks first.">
            {[
              { n: "1", t: "Clinical occupancy", d: "The clinic is 63% of total revenue. If occupancy stays below 70%, free cash flow turns negative. Drag clinical occupancy to 65% and watch the DSCR fall." },
              { n: "2", t: "Average daily rate", d: "If insurance companies push the rate from $750/day to $500/day, clinical revenue falls by $6.25M, wiping out nearly the entire profit margin." },
              { n: "3", t: "Mezzanine debt cost", d: "At 12% interest-only on $10M of mezz, that's $1.2M more in fixed annual payments. Try setting senior to 55% and mezz to 10% to see the impact." },
              { n: "4", t: "Time to stabilization", d: "Every month of delay costs ~$500K in projected revenue, while all loan payments keep running. A 6-month slip adds $3M in cumulative cash burn." },
            ].map((item, i) => (
              <div key={i} style={{ display: "flex", gap: 14, marginBottom: 14, padding: 14, background: "#f5f3ee", borderRadius: 8 }}>
                <div style={{ width: 32, height: 32, background: "#1c1c1c", color: "#f5f0e8", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontFamily: "var(--serif)", flexShrink: 0 }}>{item.n}</div>
                <div>
                  <div style={{ fontSize: 14, fontFamily: "var(--serif)", fontWeight: 600, marginBottom: 4 }}>{item.t}</div>
                  <div style={{ fontSize: 12, color: "#6b6560", fontFamily: "var(--sans)", lineHeight: 1.5 }}>{item.d}</div>
                </div>
              </div>
            ))}
          </Section>
        </div>
      );
      default: return null;
    }
  };

  return (
    <div style={{
      "--serif": "'Playfair Display', Georgia, serif",
      "--sans": "'DM Sans', system-ui, sans-serif",
      "--mono": "'JetBrains Mono', 'SF Mono', monospace",
      fontFamily: "var(--sans)",
      background: "#faf8f5",
      minHeight: "100vh",
      color: "#1c1c1c",
    }}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #1c1c1c 0%, #2a2520 100%)", padding: "32px 24px 28px", textAlign: "center" }}>
        <div style={{ fontSize: 10, letterSpacing: 4, color: "#8a8578", textTransform: "uppercase", marginBottom: 8 }}>LA RUCHE</div>
        <div style={{ fontSize: 28, fontFamily: "var(--serif)", color: "#f5f0e8", fontWeight: 400, marginBottom: 20 }}>Financial Model</div>
        <div style={{ display: "flex", justifyContent: "center", gap: 12, flexWrap: "wrap" }}>
          <StatCard label="Annual Revenue" value={fmt(m.totalRev)} accent small />
          <StatCard label="EBITDA (Year 3)" value={fmt(m.ebitda)} accent small />
          <StatCard label="DSCR" value={`${m.dscr.toFixed(2)}×`} accent small />
          <StatCard label="Enterprise Value" value={`${fmt(m.evLow)} – ${fmt(m.evHigh)}`} accent small />
        </div>
      </div>

      {/* Tab Nav */}
      <div style={{ 
        display: "flex", overflowX: "auto", borderBottom: "1px solid #e5e0d8",
        background: "#fff", position: "sticky", top: 0, zIndex: 10,
        scrollbarWidth: "none",
      }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            border: "none", background: tab === t.id ? "#faf8f5" : "transparent",
            borderBottom: tab === t.id ? "2px solid #c8102e" : "2px solid transparent",
            padding: "12px 16px", cursor: "pointer", whiteSpace: "nowrap",
            fontFamily: "var(--sans)", fontSize: 12, color: tab === t.id ? "#1c1c1c" : "#8a8578",
            fontWeight: tab === t.id ? 700 : 400, transition: "all 0.2s",
          }}>
            <span style={{ color: "#c8102e", marginRight: 4, fontFamily: "var(--mono)", fontSize: 11 }}>{t.num}</span>
            {t.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ maxWidth: 720, margin: "0 auto", padding: "28px 20px 60px" }}>
        {renderTab()}
      </div>

      {/* Footer */}
      <div style={{ textAlign: "center", padding: "20px 24px 32px", borderTop: "1px solid #e5e0d8" }}>
        <div style={{ fontSize: 11, color: "#a09a90", fontFamily: "var(--sans)" }}>
          La Ruche · Financial Model · West Hollywood, California
        </div>
        <div style={{ fontSize: 10, color: "#c4bfb5", fontFamily: "var(--sans)", marginTop: 4 }}>
          For discussion purposes only. Projections are subject to operational assumptions and market conditions. Not investment advice.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LaRucheFinancialModel />);
  </script>
</body>
</html>
